services:
  backend:
    build:
      context: .
      dockerfile: deploy/backend.Dockerfile
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.11-slim}
    env_file:
      - backend/.env
    volumes:
      - backend_data:/app/data
      - backend_downloads:/app/downloads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: deploy/frontend.Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:22-alpine}
        NGINX_IMAGE: ${NGINX_IMAGE:-nginx:1.27-alpine}
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend_data:
  backend_downloads:
